version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HISTORY_DB_PATH=/data/history.db
    volumes:
      - history_data:/data
    restart: always

volumes:
  history_data:
    driver: local
